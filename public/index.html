<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="color-scheme" content="dark" />
    <title>Agenticz Demo Voice — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #050505;
        --fg: #f5f5f5;
        --muted: #8a8a8a;
        --line: #1a1a1a;
        --slash-dark: #252525;
        --slash-mid: #7a5500;
        --gold: #ffb800;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: "Outfit", system-ui, -apple-system, Segoe UI, sans-serif;
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
        gap: 48px;
        text-align: center;
      }

      .logo {
        display: inline-flex;
        align-items: center;
        gap: 18px;
      }

      .slashes {
        display: inline-flex;
        gap: 6px;
      }

      .slashes span {
        display: block;
        width: 10px;
        height: 38px;
        transform: skewX(-18deg);
        border-radius: 2px;
      }

      .slashes .s1 {
        background: var(--slash-dark);
      }
      .slashes .s2 {
        background: var(--slash-mid);
      }
      .slashes .s3 {
        background: var(--gold);
      }

      .wordmark {
        font-family: "Outfit", sans-serif;
        font-weight: 600;
        font-size: 28px;
        letter-spacing: 0.22em;
        color: var(--fg);
        line-height: 1;
      }

      .wordmark .z {
        color: var(--gold);
      }

      .title-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .eyebrow {
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo,
          monospace;
        font-size: 11px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.4em;
        color: var(--muted);
      }

      h1 {
        margin: 0;
        font-family: "Outfit", sans-serif;
        font-weight: 300;
        font-size: clamp(36px, 6vw, 64px);
        letter-spacing: -0.01em;
        line-height: 1.05;
      }

      h1 .accent {
        color: var(--gold);
      }

      footer {
        padding: 24px;
        border-top: 1px solid var(--line);
        display: flex;
        justify-content: center;
      }

      .status {
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo,
          monospace;
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.04em;
      }

      .status .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--gold);
        margin-right: 10px;
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo" aria-label="Agenticz">
        <span class="slashes" aria-hidden="true">
          <span class="s1"></span>
          <span class="s2"></span>
          <span class="s3"></span>
        </span>
        <span class="wordmark">AGENTIC<span class="z">Z</span></span>
      </div>

      <div class="title-block">
        <div class="eyebrow">Admin</div>
        <h1>Agenticz Demo <span class="accent">Voice</span></h1>
      </div>
    </main>

    <footer>
      <div class="status">
        <span class="dot" aria-hidden="true"></span>Authentication coming in
        Phase 1
      </div>
    </footer>
  </body>
</html>
