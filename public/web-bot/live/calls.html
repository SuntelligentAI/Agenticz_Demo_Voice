<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="color-scheme" content="dark" />
    <title>Call detail — Agenticz Demo Voice</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/brand.css" />
    <style>
      body {
        visibility: hidden;
      }
      body.ready {
        visibility: visible;
      }

      .topbar .right {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .user-email {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.05em;
      }

      .btn-ghost {
        background: transparent;
        color: var(--fg);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 8px 14px;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        transition: border-color 120ms ease, color 120ms ease;
      }

      .btn-ghost:hover {
        border-color: var(--gold);
        color: var(--gold);
      }

      main {
        flex: 1;
        padding: 40px 28px 80px;
        max-width: 960px;
        margin: 0 auto;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 28px;
      }

      .card-title {
        margin: 0 0 4px;
        font-family: "Outfit", sans-serif;
        font-weight: 500;
        font-size: 22px;
      }

      .card-sub {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 13px;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        letter-spacing: 0.04em;
      }

      .meta-grid {
        display: grid;
        grid-template-columns: 160px 1fr;
        gap: 8px 20px;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 13px;
      }

      .meta-grid dt {
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-size: 11px;
        align-self: center;
      }

      .meta-grid dd {
        margin: 0;
        color: var(--fg);
        word-break: break-word;
      }

      .status-pill {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        border: 1px solid var(--line);
        background: var(--bg);
        color: var(--muted);
      }

      .status-pill.in_progress,
      .status-pill.dialing {
        border-color: var(--gold);
        color: var(--gold);
      }
      .status-pill.ended {
        border-color: var(--line);
        color: var(--fg);
      }
      .status-pill.failed {
        border-color: var(--danger);
        color: var(--danger);
      }

      .empty-state {
        padding: 30px;
        text-align: center;
        color: var(--muted);
      }

      footer {
        padding: 20px;
        border-top: 1px solid var(--line);
        text-align: center;
      }

      footer .status {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      @media (max-width: 640px) {
        .meta-grid {
          grid-template-columns: 1fr;
          gap: 2px;
        }
        .meta-grid dt {
          margin-top: 8px;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand-lockup" aria-label="Agenticz">
        <img src="/assets/brand/agenticz-logo-primary.svg" alt="Agenticz" />
      </div>
      <div class="right">
        <a class="btn-ghost" href="/">Demos</a>
        <a class="btn-ghost" href="/web-bot/live/history">History</a>
        <a class="btn-ghost" href="/web-bot/live">Dashboard</a>
        <span class="user-email" id="user-email"></span>
        <button type="button" class="btn-ghost" id="logout">Log out</button>
      </div>
    </header>

    <main>
      <section class="card" id="meta-card" hidden>
        <h2 class="card-title" id="meta-title">Call</h2>
        <p class="card-sub" id="meta-sub">—</p>
        <dl class="meta-grid">
          <dt>Status</dt>
          <dd><span class="status-pill" id="meta-status">—</span></dd>
          <dt>Outcome</dt>
          <dd id="meta-outcome">—</dd>
          <dt>Duration</dt>
          <dd id="meta-duration">—</dd>
          <dt>Prospect</dt>
          <dd id="meta-prospect">—</dd>
          <dt>Started</dt>
          <dd id="meta-started">—</dd>
          <dt>Ended</dt>
          <dd id="meta-ended">—</dd>
          <dt>Retell call ID</dt>
          <dd id="meta-retell-id">—</dd>
        </dl>
      </section>

      <section class="card" id="post-call-panel" hidden>
        <h2 class="card-title">Post-call review</h2>
        <p class="card-sub">
          AI summary, recording, transcript, captured fields, and operator
          notes.
        </p>
        <div id="post-call-content"></div>
      </section>

      <section class="card" id="empty-card">
        <div class="empty-state" id="empty-message">Loading…</div>
      </section>
    </main>

    <footer>
      <div class="status">Phase 5 · call detail</div>
    </footer>

    <script src="/assets/call-view.js" defer></script>
    <script src="/assets/call-detail.js" defer></script>
  </body>
</html>
